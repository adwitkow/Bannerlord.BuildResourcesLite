name: Publish

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/publish.yml'
      - 'src/**'
      - 'resources/**'
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x.x

      # Restore (GitHub Packages auth injected via env)
      - name: Restore
        run: dotnet restore
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build + pack
      - name: Build & Pack
        run: |
          dotnet build src/Bannerlord.BuildResources.MSBuild/Bannerlord.BuildResources.MSBuild.csproj -c Release
          dotnet pack src/Bannerlord.BuildResources/Bannerlord.BuildResources.csproj -c Release -o ./packages

      # Push to NuGet.org
      - name: Push to NuGet.org
        run: |
          dotnet nuget push "./packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

      # Push to GitHub Packages
      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./packages/*.nupkg" \
            --source https://nuget.pkg.github.com/adwitkow/index.json \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate